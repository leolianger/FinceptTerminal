# Build the repo-root Dockerfile and push a multi-arch image to Docker Hub.
# Then build a thin Olares-flavored image (Xvfb + noVNC) on top, also multi-arch.
# Both pushed to Docker Hub. Olares chart consumes <user>/finceptterminal-olares.
#
# Bump DOCKER_IMAGE_TAG below to publish a new image. Workflow pushes only the
# explicit tag (no `latest`, no commit-sha tag) so Olares charts always point
# at a known immutable build.
#
# Multi-platform: linux/amd64, linux/arm64.
# Triggers: pushes to main, manual dispatch, tag pushes (v*).
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Docker Hub — finceptterminal (Olares)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'Dockerfile.olares'
      - 'fincept-qt/**'
      - 'olares/**'
      - '.github/workflows/docker-olares.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override image tag (otherwise uses DOCKER_IMAGE_TAG env)'
        required: false
        default: ''

env:
  # Edit this when publishing a new image; must match
  # terminus-apps/finceptterminal/values.yaml → image.tag.
  DOCKER_IMAGE_TAG: 4.0.2
  IMAGE_NAME: finceptterminal
  OLARES_IMAGE_NAME: finceptterminal-olares

jobs:
  base:
    name: Build base image (Qt runtime)
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${DOCKER_IMAGE_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=finceptterminal-base
          cache-to: type=gha,mode=max,scope=finceptterminal-base

  olares:
    name: Build Olares image (noVNC wrapper)
    needs: base
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Olares image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.olares
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.base.outputs.tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.OLARES_IMAGE_NAME }}:${{ needs.base.outputs.tag }}
          cache-from: type=gha,scope=finceptterminal-olares
          cache-to: type=gha,mode=max,scope=finceptterminal-olares
